version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: postgres_db1
    restart: always
    environment:
      POSTGRES_DB: db_eventclean
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: eventclean_api1
    depends_on:
      - postgres
    ports:
      - "8080:8080"